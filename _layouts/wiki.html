---
layout: default
---
<article class="prose">
  <p class="breadcrumb"><a href="{{ '/wiki/' | relative_url }}">wiki</a></p>
  <h1 class="page-title">{{ page.title }}</h1>
  {% if page.tags and page.tags != empty %}
  <p class="post-meta">{% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}</p>
  {% endif %}
  {{ content }}
</article>
