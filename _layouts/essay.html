---
layout: default
---
<article class="prose">
  <header class="post-header">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.date %}<p class="post-meta"><time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%b %Y" }}</time></p>{% endif %}
  </header>
  {{ content }}
</article>
